# Ephemeral tmpfs scratch space (64 MiB).
# nosuid: ignore SUID bits to prevent privilege escalation via copied binaries.
# nodev: prevent special device files from being used, blocking /dev node abuse.
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    options: "size=67108864"
    nosuid: true
    nodev: true
}
