# Static nsjail configuration for the code execution sandbox.
# All settings here are identical across every invocation. Per-invocation
# settings (runtime bind mounts, user code directory, resource limits,
# timeout, environment variables, command) are passed as CLI flags.

# Run the sandboxed process exactly once, then exit.
mode: ONCE

# Seccomp-bpf policy: block dangerous syscalls while allowing normal operation.
# Uses a blacklist approach (DEFAULT ALLOW) to minimize maintenance burden
# when adding new runtimes or upgrading runtime versions.
seccomp_policy_file: "/etc/nsjail/seccomp.kafel"

# Capture nsjail log output via the pipe fd passed as ExtraFiles[0] (fd 3).
# The Go process reads this to detect timeouts and signal kills.
log_fd: 3

# Working directory inside the jail.
cwd: "/code"

# Auto-detect cgroup v2 at runtime for cgroup-based limits.
detect_cgroupv2: true

# Restrict the sandboxed process to exactly one CPU core via sched_setaffinity().
# The core is randomly selected from the available set at each invocation.
# Prevents a single sandbox from monopolizing all available cores.
max_cpus: 1

# Create a new network namespace, isolating the sandbox from the host network
# stack. The sandbox gets an empty namespace with no external interfaces.
clone_newnet: true

# Do not bring up the loopback interface inside the network namespace.
# clone_newnet already isolates external network access. This additionally
# prevents localhost communication between processes within the sandbox,
# eliminating the remaining network attack surface.
iface_no_lo: true

# HOME must be set because many tools read it for config/cache paths.
envar: "HOME=/tmp"

# Static rlimits (constant across all runtimes and execution steps).
# Each requires an explicit _type: VALUE because the protobuf defaults
# for these fields are SOFT, which would ignore the numeric value.

# 8 MiB stack; explicit match of Linux default.
rlimit_stack: 8
rlimit_stack_type: VALUE

# No legitimate reason to lock memory in a sandbox.
rlimit_memlock: 0
rlimit_memlock_type: VALUE

# Real-time scheduling is unnecessary in a sandbox.
rlimit_rtprio: 0
rlimit_rtprio_type: VALUE

# POSIX message queues are unnecessary in a sandbox.
rlimit_msgqueue: 0
rlimit_msgqueue_type: VALUE

# -- Filesystem mounts --
# Mounts are processed in order. Config entries come first, then CLI
# entries (-R, -B) are appended.

# Shared libraries required by the dynamic linker and language runtimes.
mount {
    src: "/usr/lib"
    dst: "/usr/lib"
    is_bind: true
}

# /usr/lib64 exists on x86_64 systems but not on aarch64.
# mandatory: false causes nsjail to skip without error if absent.
#
# Caveat: when src is absent, nsjail's createMountTarget (mnt_legacy.cc)
# calls isDirectory(src) which returns false for a missing path, so it
# creates a regular *file* (not a directory) at dst inside the jail as the
# mount target. The subsequent bind mount fails and is skipped, but the
# empty file remains. This means /usr/lib64 exists inside the jail as an
# empty regular file on aarch64, rather than being truly absent.
mount {
    src: "/usr/lib64"
    dst: "/usr/lib64"
    is_bind: true
    mandatory: false
}

# usrmerge symlinks: create /lib -> /usr/lib and /lib64 -> /usr/lib64 inside
# the jail, matching the host's usrmerge layout without double bind-mounting.
mount {
    src: "/usr/lib"
    dst: "/lib"
    is_symlink: true
}

# The /lib64 symlink is always created (symlink(2) does not check whether
# the target exists). On x86_64 it points to the read-only bind-mounted
# /usr/lib64 directory; on aarch64 it points to the empty file left behind
# by the skipped bind mount above, making /lib64/<anything> fail with
# ENOTDIR instead of EROFS.
mount {
    src: "/usr/lib64"
    dst: "/lib64"
    is_symlink: true
    mandatory: false
}

# Standard utilities (id, env, etc.).
mount {
    src: "/usr/bin"
    dst: "/usr/bin"
    is_bind: true
}

# usrmerge compatibility: /bin/sh, /bin/bash etc. are under /usr/bin.
mount {
    src: "/usr/bin"
    dst: "/bin"
    is_symlink: true
}

# Debian alternatives symlinks (e.g. awk -> /etc/alternatives/awk -> /usr/bin/mawk).
# Needed so that /usr/bin symlinks managed by update-alternatives resolve inside the jail.
mount {
    src: "/etc/alternatives"
    dst: "/etc/alternatives"
    is_bind: true
}

# Device files commonly opened by sandboxed programs.
mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
}

# PRNG seeding (V8, Ruby, Go crypto/rand, etc.)
mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
}

# Ephemeral tmpfs scratch space (64 MiB).
# nosuid: ignore SUID bits to prevent privilege escalation via copied binaries.
# nodev: prevent special device files from being used, blocking /dev node abuse.
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    options: "size=67108864"
    nosuid: true
    nodev: true
}

# Read-only /proc (needed for /proc/self).
mount {
    dst: "/proc"
    fstype: "proc"
}

# Symlink so /dev/fd works inside the sandbox.
mount {
    src: "/proc/self/fd"
    dst: "/dev/fd"
    is_symlink: true
}

# -- UID/GID mapping --
# Map host UID 0 (root inside the Docker container) to nobody (65534) inside
# the sandbox. outside_id is omitted, defaulting to "" which resolves to the
# current process UID/GID (0 when running as root in Docker). The kernel
# authorizes filesystem operations using outside_id=0, so read-write access
# to bind-mounted paths (/code, /usr/lib, etc.) is unaffected. Only one UID
# is mapped (count defaults to 1), so setuid() to any other UID fails with
# EPERM.
uidmap {
    inside_id: "65534"
}
gidmap {
    inside_id: "65534"
}
