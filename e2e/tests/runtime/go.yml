                package main

                import "fmt"

                func PrintHello() {
                    fmt.Println("Hello from helper")
                }
        output:
          status: 200
          body:
            compile:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 0
              status: "OK"
              signal: null
            run:
              stdout: "Hello from helper\n"
              stderr: ""
              output: "Hello from helper\n"
              exit_code: 0
              status: "OK"
              signal: null

