tests:
  - name: "hello world"
    requests:
      - input:
          runtime: go
          files:
            - name: main.go
              type: raw
              content: |
                package main

                import "fmt"

                func main() {
                    fmt.Println("Hello, World!")
                }
        output:
          status: 200
          body:
            compile:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 0
              status: "OK"
              signal: null
            run:
              stdout: "Hello, World!\n"
              stderr: ""
              output: "Hello, World!\n"
              exit_code: 0
              status: "OK"
              signal: null

  - name: "compile error"
    requests:
      - input:
          runtime: go
          files:
            - name: main.go
              type: raw
              content: |
                package main

                func main() {
                    undefined_variable
                }
        output:
          status: 200
          body:
            compile:
              stdout: ""
              stderr: "# sandbox\n./main.go:4:5: undefined: undefined_variable\n"
              output: "# sandbox\n./main.go:4:5: undefined: undefined_variable\n"
              exit_code: 1
              status: "OK"
              signal: null

