  - name: "restricted file go.mod rejected"
    requests:
      - input:
          runtime: go
          files:
            - name: go.mod
              type: raw
              content: |
                module sandbox

                go 1.26
        output:
          status: 400
          body:
            error: 'file "go.mod" is not allowed for the go runtime'

  - name: "restricted file go.sum rejected"
    requests:
      - input:
          runtime: go
          files:
            - name: go.sum
              type: raw
              content: ""
        output:
          status: 400
          body:
            error: 'file "go.sum" is not allowed for the go runtime'

  - name: "restricted file go.mod rejected even with valid main.go"
    requests:
      - input:
          runtime: go
          files:
            - name: main.go
              type: raw
              content: |
                package main

                func main() {}
            - name: go.mod
              type: raw
              content: |
                module sandbox

                go 1.26
        output:
          status: 400
          body:
            error: 'file "go.mod" is not allowed for the go runtime'

  - name: "restricted file main rejected"
    requests:
      - input:
          runtime: go
          files:
            - name: main.go
              type: raw
              content: |
                package main

                func main() {}
            - name: main
              type: raw
              content: "data"
        output:
          status: 400
          body:
            error: 'file "main" is not allowed for the go runtime'

  - name: "multiple files"
