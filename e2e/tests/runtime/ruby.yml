tests:
  - name: "hello world"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                puts "Hello, World!"
        output:
          status: 200
          body:
            run:
              stdout: "Hello, World!\n"
              stderr: ""
              output: "Hello, World!\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "stderr output"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                $stderr.puts "error message"
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "error message\n"
              output: "error message\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "stdout and stderr"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                $stdout.sync = true
                puts "out"
                $stderr.puts "err"
        output:
          status: 200
          body:
            run:
              stdout: "out\n"
              stderr: "err\n"
              output: "out\nerr\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "non-zero exit code"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                exit(1)
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "stderr with non-zero exit code"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                $stderr.puts "error occurred"
                exit(2)
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "error occurred\n"
              output: "error occurred\n"
              exit_code: 2
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "multiple files with require_relative"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                require_relative './helper'
                puts greet("World")
            - name: helper.rb
              type: plain
              content: |
                def greet(name)
                  "Hello, #{name}!"
                end
        output:
          status: 200
          body:
            run:
              stdout: "Hello, World!\n"
              stderr: ""
              output: "Hello, World!\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "JSON parse and generate"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                require 'json'
                data = JSON.parse('{"name":"Alice","age":30}')
                data["active"] = true
                puts JSON.generate(data)
        output:
          status: 200
          body:
            run:
              stdout: "{\"name\":\"Alice\",\"age\":30,\"active\":true}\n"
              stderr: ""
              output: "{\"name\":\"Alice\",\"age\":30,\"active\":true}\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "array operations"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                nums = [3, 1, 4, 1, 5, 9, 2, 6]
                result = nums.select { |n| n > 3 }.map { |n| n * 2 }.sort
                puts result.join(",")
        output:
          status: 200
          body:
            run:
              stdout: "8,10,12,18\n"
              stderr: ""
              output: "8,10,12,18\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "class and inheritance"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                class Shape
                  attr_reader :name
                  def initialize(name)
                    @name = name
                  end
                  def area
                    0
                  end
                end

                class Circle < Shape
                  def initialize(radius)
                    super("circle")
                    @radius = radius
                  end
                  def area
                    Math::PI * @radius ** 2
                  end
                end

                c = Circle.new(5)
                puts c.name
                puts format("%.2f", c.area)
        output:
          status: 200
          body:
            run:
              stdout: "circle\n78.54\n"
              stderr: ""
              output: "circle\n78.54\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "begin/rescue error handling"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                begin
                  1 / 0
                rescue ZeroDivisionError => e
                  puts "Caught: #{e.message}"
                end
        output:
          status: 200
          body:
            run:
              stdout: "Caught: divided by 0\n"
              stderr: ""
              output: "Caught: divided by 0\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "unhandled exception"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                raise "something went wrong"
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/sandbox/main.rb:1:in '<main>': something went wrong (RuntimeError)\n"
              output: "/sandbox/main.rb:1:in '<main>': something went wrong (RuntimeError)\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "hash operations"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                h = { a: 1, b: 2, c: 3 }
                puts h.keys.join(",")
                puts h.values.join(",")
                puts h.map { |k, v| "#{k}=#{v}" }.join(" ")
        output:
          status: 200
          body:
            run:
              stdout: "a,b,c\n1,2,3\na=1 b=2 c=3\n"
              stderr: ""
              output: "a,b,c\n1,2,3\na=1 b=2 c=3\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "block and iterator"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                result = (1..5).each_with_object([]) do |n, acc|
                  acc << n * n
                end
                puts result.join(",")

                sum = (1..100).reduce(0, :+)
                puts sum
        output:
          status: 200
          body:
            run:
              stdout: "1,4,9,16,25\n5050\n"
              stderr: ""
              output: "1,4,9,16,25\n5050\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "string operations"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                s = "Hello, World!"
                puts s.upcase
                puts s.gsub("World", "Ruby")
                puts s.split(", ").join(" - ")
                puts s.include?("World")
        output:
          status: 200
          body:
            run:
              stdout: "HELLO, WORLD!\nHello, Ruby!\nHello - World!\ntrue\n"
              stderr: ""
              output: "HELLO, WORLD!\nHello, Ruby!\nHello - World!\ntrue\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "regular expression"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                text = "Date: 2025-12-25"
                if text =~ /(\d{4})-(\d{2})-(\d{2})/
                  puts "#{$1} #{$2} #{$3}"
                end
        output:
          status: 200
          body:
            run:
              stdout: "2025 12 25\n"
              stderr: ""
              output: "2025 12 25\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "pre-installed gem fiddle"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                require 'fiddle'

                # Verify the pre-installed gem is loadable and its API is
                # accessible. SIZEOF_VOIDP is set during Fiddle initialization
                # based on the platform's pointer width (8 on amd64/arm64).
                puts Fiddle::SIZEOF_VOIDP
        output:
          status: 200
          body:
            run:
              stdout: "8\n"
              stderr: ""
              output: "8\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "pre-installed gem base64 standard encode/decode"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                require 'base64'

                encoded = Base64.encode64("Hello, World!")
                puts encoded
                puts Base64.decode64(encoded)
        output:
          status: 200
          body:
            run:
              stdout: "SGVsbG8sIFdvcmxkIQ==\nHello, World!\n"
              stderr: ""
              output: "SGVsbG8sIFdvcmxkIQ==\nHello, World!\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "pre-installed gem base64 strict encode/decode"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                require 'base64'

                # strict_encode64 omits the trailing newline and never wraps
                # at 60 columns, unlike encode64.
                long = "a" * 50
                encoded = Base64.strict_encode64(long)
                puts encoded
                puts encoded.length
                puts Base64.strict_decode64(encoded) == long
        output:
          status: 200
          body:
            run:
              stdout: "YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=\n68\ntrue\n"
              stderr: ""
              output: "YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=\n68\ntrue\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "pre-installed gem base64 urlsafe encode/decode"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                require 'base64'

                # Bytes 0xfb 0xff produce '+' and '/' under standard Base64;
                # urlsafe_encode64 substitutes '-' and '_' instead so the
                # result is safe to embed in URLs.
                bytes = [0xfb, 0xff, 0xbf].pack("C*")
                std    = Base64.strict_encode64(bytes)
                urlsafe = Base64.urlsafe_encode64(bytes)
                puts std
                puts urlsafe
                puts Base64.urlsafe_decode64(urlsafe).bytes.map { |b| format("%02x", b) }.join
        output:
          status: 200
          body:
            run:
              stdout: "+/+/\n-_-_\nfbffbf\n"
              stderr: ""
              output: "+/+/\n-_-_\nfbffbf\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "pre-installed gem base64 binary round-trip"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                require 'base64'

                # Round-trip every byte value 0..255 to confirm binary safety.
                original = (0..255).map(&:chr).join.force_encoding(Encoding::ASCII_8BIT)
                decoded  = Base64.decode64(Base64.encode64(original))
                puts original.bytesize
                puts decoded.bytesize
                puts decoded == original
        output:
          status: 200
          body:
            run:
              stdout: "256\n256\ntrue\n"
              stderr: ""
              output: "256\n256\ntrue\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "pre-installed gem csv parse with headers"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                require 'csv'

                input = "name,age,city\nAlice,30,Tokyo\nBob,25,Osaka\n"
                rows = CSV.parse(input, headers: true)
                rows.each do |row|
                  puts "#{row['name']} (#{row['age']}) lives in #{row['city']}"
                end
        output:
          status: 200
          body:
            run:
              stdout: "Alice (30) lives in Tokyo\nBob (25) lives in Osaka\n"
              stderr: ""
              output: "Alice (30) lives in Tokyo\nBob (25) lives in Osaka\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "pre-installed gem csv generate with quoting"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                require 'csv'

                output = CSV.generate do |csv|
                  csv << ["name", "note"]
                  csv << ["Alice", "hello, world"]
                  csv << ["Bob",   "she said \"hi\""]
                end
                print output
        output:
          status: 200
          body:
            run:
              stdout: "name,note\nAlice,\"hello, world\"\nBob,\"she said \"\"hi\"\"\"\n"
              stderr: ""
              output: "name,note\nAlice,\"hello, world\"\nBob,\"she said \"\"hi\"\"\"\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "pre-installed gem csv custom column separator"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                require 'csv'

                # TSV input parsed via col_sep; round-trip back to TSV.
                input = "id\tname\n1\tAlice\n2\tBob\n"
                rows  = CSV.parse(input, col_sep: "\t", headers: true)
                rows.each { |row| puts "#{row['id']}=#{row['name']}" }

                tsv = CSV.generate(col_sep: "\t") do |csv|
                  csv << ["id", "name"]
                  rows.each { |row| csv << [row['id'], row['name']] }
                end
                print tsv
        output:
          status: 200
          body:
            run:
              stdout: "1=Alice\n2=Bob\nid\tname\n1\tAlice\n2\tBob\n"
              stderr: ""
              output: "1=Alice\n2=Bob\nid\tname\n1\tAlice\n2\tBob\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "pre-installed gem csv round-trip via parse and generate"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                require 'csv'

                rows = [
                  ["product", "price", "in_stock"],
                  ["apple",   "100",   "true"],
                  ["banana",  "50",    "false"],
                ]
                serialized = CSV.generate { |csv| rows.each { |r| csv << r } }
                parsed = CSV.parse(serialized)
                puts parsed == rows
                puts parsed.length
                puts parsed[1].join("|")
        output:
          status: 200
          body:
            run:
              stdout: "true\n3\napple|100|true\n"
              stderr: ""
              output: "true\n3\napple|100|true\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "user-submitted Gemfile is rejected"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                puts "ok"
            - name: Gemfile
              type: plain
              content: |
                source "https://rubygems.org"
                gem "rails"
        output:
          status: 400
          body:
            error:
              code: VALIDATION_ERROR
              message: "request validation failed"
              errors:
                - path: ["files", 1, "name"]
                  message: "not allowed for this runtime"

  - name: "user-submitted Gemfile.lock is rejected"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                puts "ok"
            - name: Gemfile.lock
              type: plain
              content: ""
        output:
          status: 400
          body:
            error:
              code: VALIDATION_ERROR
              message: "request validation failed"
              errors:
                - path: ["files", 1, "name"]
                  message: "not allowed for this runtime"
