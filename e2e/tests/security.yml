tests:
  - name: "execution timeout"
    input:
      runtime: ruby
      files:
        - name: main.rb
          content: |
            sleep 60
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 137
        status: "TIMEOUT"
        signal: "SIGKILL"

  - name: "timeout with partial output"
    input:
      runtime: ruby
      files:
        - name: main.rb
          content: |
            $stdout.sync = true
            puts "started"
            sleep 60
    output:
      status: 200
      run:
        stdout: "started\n"
        stderr: ""
        output: "started\n"
        exit_code: 137
        status: "TIMEOUT"
        signal: "SIGKILL"

  - name: "user exit with signal-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(137);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 137
        status: "OK"
        signal: null

  - name: "user exit with SIGSEGV-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(139);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 139
        status: "OK"
        signal: null

  - name: "user exit with SIGTERM-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(143);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 143
        status: "OK"
        signal: null

  - name: "user exit with SIGINT-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(130);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 130
        status: "OK"
        signal: null

  - name: "process killed by SIGSEGV"
    input:
      runtime: ruby
      files:
        - name: main.rb
          content: |
            Process.kill("SEGV", Process.pid)
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 139
        status: "OK"
        signal: "SIGSEGV"
