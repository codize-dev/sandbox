tests:
  - name: "execution timeout"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            setTimeout(() => {}, 60000);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 137
        status: "TIMEOUT"
        signal: "SIGKILL"

  - name: "timeout with partial output"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            console.log("started");
            setTimeout(() => {}, 60000);
    output:
      status: 200
      run:
        stdout: "started\n"
        stderr: ""
        output: "started\n"
        exit_code: 137
        status: "TIMEOUT"
        signal: "SIGKILL"

  - name: "user exit with signal-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(137);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 137
        status: "OK"
        signal: null

  - name: "user exit with SIGSEGV-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(139);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 139
        status: "OK"
        signal: null

  - name: "user exit with SIGTERM-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(143);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 143
        status: "OK"
        signal: null

  - name: "user exit with SIGINT-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(130);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 130
        status: "OK"
        signal: null

  - name: "path traversal with dotdot-slash"
    input:
      runtime: node
      files:
        - name: "../escape.js"
          content: |
            console.log("escaped");
    output:
      status: 400
      error: 'file name "../escape.js" contains invalid characters'

  - name: "deep path traversal"
    input:
      runtime: node
      files:
        - name: "../../etc/passwd"
          content: |
            console.log("escaped");
    output:
      status: 400
      error: 'file name "../../etc/passwd" contains invalid characters'

  - name: "subdirectory slash rejected"
    input:
      runtime: node
      files:
        - name: "a/b.js"
          content: |
            console.log("escaped");
    output:
      status: 400
      error: 'file name "a/b.js" contains invalid characters'
