tests:
  - name: "/dev/shm is not accessible (not mounted in sandbox)"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                ls /dev/shm
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "ls: cannot access '/dev/shm': No such file or directory\n"
              output: "ls: cannot access '/dev/shm': No such file or directory\n"
              exit_code: 2
              status: "OK"
              signal: null
