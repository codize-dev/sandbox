tests:
  - name: "symlink in /tmp pointing outside sandbox cannot reach host files"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                ln -s /etc/shadow /tmp/escape_link && cat /tmp/escape_link
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "cat: /tmp/escape_link: No such file or directory\n"
              output: "cat: /tmp/escape_link: No such file or directory\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "device node creation in /code is blocked (no CAP_MKNOD)"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                mknod /code/urandom c 1 9
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "mknod: /code/urandom: Operation not permitted\n"
              output: "mknod: /code/urandom: Operation not permitted\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "SUID bit set in /code does not grant elevated privileges"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                cp /usr/bin/id /code/suid-id
                chmod 4755 /code/suid-id 2>/dev/null
                /code/suid-id
        output:
          status: 200
          body:
            run:
              stdout: "uid=65534 gid=65534 groups=65534\n"
              stderr: ""
              output: "uid=65534 gid=65534 groups=65534\n"
              exit_code: 0
              status: "OK"
              signal: null

  - name: "hardlink across filesystem boundaries is blocked"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                echo test > /tmp/srcfile && ln /tmp/srcfile /code/crosslink
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "ln: failed to create hard link '/code/crosslink' => '/tmp/srcfile': Invalid cross-device link\n"
              output: "ln: failed to create hard link '/code/crosslink' => '/tmp/srcfile': Invalid cross-device link\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "named pipe (FIFO) communication works within sandbox"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                mkfifo /tmp/testpipe
                echo "hello" > /tmp/testpipe &
                result=$(cat /tmp/testpipe)
                wait
                if [ "$result" = "hello" ]; then
                  echo "ok"
                else
                  echo "error"
                fi
        output:
          status: 200
          body:
            run:
              stdout: "ok\n"
              stderr: ""
              output: "ok\n"
              exit_code: 0
              status: "OK"
              signal: null
