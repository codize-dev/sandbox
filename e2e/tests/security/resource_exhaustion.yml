tests:
  - name: "file descriptor exhaustion is enforced by rlimit_nofile"
    requests:
      - input:
          runtime: node
          files:
            - name: index.js
              type: plain
              content: |
                const fs = require("fs");
                const fds = [];
                try {
                  for (let i = 0; i < 200; i++) {
                    fds.push(fs.openSync("/dev/null", "r"));
                  }
                  console.log(fds.length);
                } catch (e) {
                  console.error(e.message);
                  process.exit(1);
                }
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "EMFILE: too many open files, open '/dev/null'\n"
              output: "EMFILE: too many open files, open '/dev/null'\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "tmpfs inode exhaustion is bounded by size limit"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                for i in $(seq 1 100000); do
                  echo x > /tmp/f$i || exit 1
                done
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/^/sandbox/main\\.sh: line \\d+: echo: write error: No space left on device\n$/"
              output: "/^/sandbox/main\\.sh: line \\d+: echo: write error: No space left on device\n$/"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "CPU spin with multiple processes is terminated by timeout"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                for i in 1 2 3 4; do
                  while true; do :; done &
                done
                wait
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 137
              status: "TIMEOUT"
              signal: "SIGKILL"
              duration_ms: "/^[0-9]+$/"
