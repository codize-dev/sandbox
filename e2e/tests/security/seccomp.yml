  - name: "AF_ALG socket creation is blocked by seccomp (go)"
    requests:
      - input:
          runtime: go
          files:
            - name: main.go
              type: plain
              content: |
                package main

                import (
                	"fmt"
                	"syscall"
                )

                func main() {
                	// AF_ALG = 38
                	fd, _, errno := syscall.RawSyscall(syscall.SYS_SOCKET, 38, syscall.SOCK_SEQPACKET, 0)
                	if errno == syscall.EPERM {
                		fmt.Println("EPERM")
                		return
                	}
                	if errno != 0 {
                		fmt.Printf("UNEXPECTED: errno=%d\n", int(errno))
                		return
                	}
                	syscall.Close(int(fd))
                	fmt.Println("ALLOWED")
                }
        output:
          status: 200
          body:
            compile:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"
            run:
              stdout: "EPERM\n"
              stderr: ""
              output: "EPERM\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "AF_ALG socket with non-zero high 32 bits in family arg is also blocked (go)"
    requests:
      - input:
          runtime: go
          files:
            - name: main.go
              type: plain
              content: |
                package main

                import (
                	"fmt"
                	"syscall"
                )

                func main() {
                	// family = AF_ALG (38) with non-zero high 32 bits. Linux truncates
                	// the family arg to int (still routes to AF_ALG), but seccomp sees
                	// the full 64-bit args[0]. Verifies that the whitelist rule blocks
                	// AF_ALG even when high bits are set — this is the historical bypass
                	// that motivated using kafel's built-in `family` (size=4) instead of
                	// the inline declaration form (which would default to size=8).
                	family := uintptr(38) | (uintptr(1) << 32)
                	fd, _, errno := syscall.RawSyscall(syscall.SYS_SOCKET, family, syscall.SOCK_SEQPACKET, 0)
                	if errno == syscall.EPERM {
                		fmt.Println("EPERM")
                		return
                	}
                	if errno != 0 {
                		fmt.Printf("UNEXPECTED: errno=%d\n", int(errno))
                		return
                	}
                	syscall.Close(int(fd))
                	fmt.Println("BYPASSED")
                }
        output:
          status: 200
          body:
            compile:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"
            run:
              stdout: "EPERM\n"
              stderr: ""
              output: "EPERM\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "AF_UNIX socket with non-zero high 32 bits in family arg is allowed (size=4 regression)"
    requests:
      - input:
          runtime: go
          files:
            - name: main.go
              type: plain
              content: |
                package main

                import (
                	"fmt"
                	"syscall"
                )

                func main() {
                	// family = AF_UNIX (1) with non-zero high 32 bits. Kernel truncates
                	// to int (treats as AF_UNIX) and seccomp must do the same: only the
                	// low 32 bits matter. With the correct size=4 rule, this call is
                	// allowed because LOW=1 ∈ {AF_UNIX, AF_INET, AF_INET6, AF_NETLINK}.
                	// If the rule were rewritten with the inline declaration form
                	// (size=8), the HIGH_WORD!=0 condition would over-trigger the
                	// whitelist's negation chain and incorrectly block this legitimate
                	// AF_UNIX call. This test catches that misconfiguration.
                	family := uintptr(1) | (uintptr(1) << 32)
                	fd, _, errno := syscall.RawSyscall(syscall.SYS_SOCKET, family, syscall.SOCK_STREAM, 0)
                	if errno != 0 {
                		fmt.Printf("BLOCKED: errno=%d\n", int(errno))
                		return
                	}
                	syscall.Close(int(fd))
                	fmt.Println("OK")
                }
        output:
          status: 200
          body:
            compile:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"
            run:
              stdout: "OK\n"
              stderr: ""
              output: "OK\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

