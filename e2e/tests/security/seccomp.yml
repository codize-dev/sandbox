  - name: "ptrace is blocked by seccomp (go)"
    requests:
      - input:
          runtime: go
          files:
            - name: main.go
              type: plain
              content: |
                package main

                import "syscall"

                func main() {
                	syscall.RawSyscall(syscall.SYS_PTRACE, 0, 0, 0)
                }
        output:
          status: 200
          body:
            compile:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 0
              status: "OK"
              signal: null
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 159
              status: "SIGNAL"
              signal: "SIGSYS"

  - name: "io_uring_setup returns ENOSYS instead of killing process (ruby)"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                begin
                  syscall(425)
                rescue Errno::ENOSYS
                  puts "ENOSYS"
                end
        output:
          status: 200
          body:
            run:
              stdout: "ENOSYS\n"
              stderr: ""
              output: "ENOSYS\n"
              exit_code: 0
              status: "OK"
              signal: null

  - name: "io_uring_enter returns ENOSYS instead of killing process (ruby)"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                begin
                  syscall(426, 0, 0, 0, 0, 0)
                rescue Errno::ENOSYS
                  puts "ENOSYS"
                end
        output:
          status: 200
          body:
            run:
              stdout: "ENOSYS\n"
