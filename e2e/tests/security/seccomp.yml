tests:
  - name: "ptrace is blocked by seccomp (ruby)"
    arch: [amd64]
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                syscall(101)
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 159
              status: "SIGNAL"
              signal: "SIGSYS"

  - name: "ptrace is blocked by seccomp (ruby)"
    arch: [arm64]
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                syscall(117)
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 159
              status: "SIGNAL"
              signal: "SIGSYS"

  - name: "mount is blocked by seccomp (ruby)"
    arch: [amd64]
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                syscall(165)
        output:
          status: 200
          body:
            run:
