  - name: "socketpair with non-AF_UNIX family is blocked by seccomp (go)"
    requests:
      - input:
          runtime: go
          files:
            - name: main.go
              type: plain
              content: |
                package main

                import (
                	"fmt"
                	"syscall"
                	"unsafe"
                )

                func main() {
                	// socketpair() is only legitimately used with AF_UNIX. The kernel
                	// itself returns EOPNOTSUPP for other families; seccomp enforces
                	// the same boundary as a defense-in-depth layer.
                	var fds [2]int32
                	_, _, errno := syscall.RawSyscall6(
                		syscall.SYS_SOCKETPAIR,
                		uintptr(syscall.AF_INET),
                		uintptr(syscall.SOCK_STREAM),
                		0,
                		uintptr(unsafe.Pointer(&fds)),
                		0, 0,
                	)
                	if errno == syscall.EPERM {
                		fmt.Println("EPERM")
                		return
                	}
                	fmt.Printf("UNEXPECTED: errno=%d\n", int(errno))
                }
        output:
          status: 200
          body:
            compile:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"
            run:
              stdout: "EPERM\n"
              stderr: ""
              output: "EPERM\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

