tests:
  - name: "/usr/lib is mounted with nosuid and nodev"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                grep ' /usr/lib ' /proc/mounts | tr ' ' '\n' | sed -n '4p' | tr ',' '\n' | grep -E '^(nosuid|nodev)$' | sort
        output:
          status: 200
          body:
            run:
              stdout: "nodev\nnosuid\n"
              stderr: ""
              output: "nodev\nnosuid\n"
              exit_code: 0
              status: "OK"
              signal: null

  - name: "/usr/lib64 is mounted with nosuid and nodev"
    arch: [amd64]
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
