tests:
  - name: "/usr/lib is mounted with nosuid and nodev"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                line=$(grep ' /usr/lib ' /proc/mounts)
                if echo "$line" | grep -q nosuid && echo "$line" | grep -q nodev; then
                  echo "blocked"
                else
                  echo "allowed"
                fi
        output:
          status: 200
          body:
            run:
              stdout: "blocked\n"
              stderr: ""
              output: "blocked\n"
              exit_code: 0
              status: "OK"
              signal: null

  - name: "/usr/lib64 is mounted with nosuid and nodev"
    arch: [amd64]
