  - name: "Ruby system() for shell command injection"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                system("cat /etc/shadow")
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "cat: /etc/shadow: No such file or directory\n"
              output: "cat: /etc/shadow: No such file or directory\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "crypto mining attempt is terminated by timeout"
    requests:
      - input:
          runtime: node
          files:
            - name: index.js
              type: plain
              content: |
                let x = 0;
                while (true) {
                  x = Math.sqrt(x + Math.random()) * Math.PI;
                }
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 137
              status: "TIMEOUT"
              signal: "SIGKILL"
              duration_ms: "/^[0-9]+$/"

  - name: "persist data in /tmp then steal in second request"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                echo "STOLEN_SECRET=password123" > /tmp/persist.txt
                echo "persisted"
        output:
          status: 200
          body:
            run:
              stdout: "persisted\n"
              stderr: ""
              output: "persisted\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                cat /tmp/persist.txt
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "cat: /tmp/persist.txt: No such file or directory\n"
              output: "cat: /tmp/persist.txt: No such file or directory\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

