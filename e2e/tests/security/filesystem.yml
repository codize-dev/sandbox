tests:
  - name: "bare command name resolves via PATH"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                if id > /dev/null 2>&1; then
                  echo "ok"
                else
                  echo "error"
                fi
        output:
          status: 200
          body:
            run:
              stdout: "ok\n"
              stderr: ""
              output: "ok\n"
              exit_code: 0
              status: "OK"
              signal: null

  - name: "/bin/sh is accessible via symlink"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                if [ -f /bin/sh ]; then
                  echo "ok"
                else
                  echo "error"
                fi
        output:
          status: 200
          body:
            run:
              stdout: "ok\n"
              stderr: ""
              output: "ok\n"
              exit_code: 0
              status: "OK"
              signal: null

  - name: "/lib write is blocked (symlink to read-only /usr/lib)"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                echo x > /lib/test
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/code/main.sh: line 1: /lib/test: Read-only file system\n"
              output: "/code/main.sh: line 1: /lib/test: Read-only file system\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "/usr is read-only"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                echo x > /usr/bin/test
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/code/main.sh: line 1: /usr/bin/test: Read-only file system\n"
              output: "/code/main.sh: line 1: /usr/bin/test: Read-only file system\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "/lib64 is read-only or absent"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                echo x > /lib64/test
        output:
          status: 200
          body:
            run:
              stdout: ""
              # Error message differs by architecture: see nsjail.cfg /lib64 comments.
              stderr: "/^/code/main\\.sh: line 1: /lib64/test: (Not a directory|Read-only file system)\n$/"
              output: "/^/code/main\\.sh: line 1: /lib64/test: (Not a directory|Read-only file system)\n$/"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "/dev/null is accessible"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                if echo test > /dev/null; then
                  echo "ok"
                else
                  echo "error"
                fi
        output:
          status: 200
          body:
            run:
              stdout: "ok\n"
              stderr: ""
              output: "ok\n"
              exit_code: 0
              status: "OK"
              signal: null

  - name: "/dev/urandom is accessible"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                if head -c 16 /dev/urandom > /dev/null 2>&1; then
                  echo "ok"
                else
                  echo "error"
                fi
        output:
          status: 200
          body:
            run:
              stdout: "ok\n"
              stderr: ""
              output: "ok\n"
              exit_code: 0
              status: "OK"
              signal: null

  - name: "/proc is read-only"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                echo 0 > /proc/self/oom_score_adj
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/code/main.sh: line 1: /proc/self/oom_score_adj: Read-only file system\n"
              output: "/code/main.sh: line 1: /proc/self/oom_score_adj: Read-only file system\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "node runtime directory is read-only"
    requests:
      - input:
          runtime: node
          files:
            - name: index.js
              type: raw
              content: |
                const fs = require("fs");
                fs.writeFileSync("/mise/installs/node/24.14.0/test", "x");
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/^node:fs:\\d+\\n[\\s\\S]*Error: EROFS: read-only file system, open '/mise/installs/node/[\\d.]+/test'[\\s\\S]*Node\\.js v[\\d.]+\\n$/"
              output: "/^node:fs:\\d+\\n[\\s\\S]*Error: EROFS: read-only file system, open '/mise/installs/node/[\\d.]+/test'[\\s\\S]*Node\\.js v[\\d.]+\\n$/"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "ruby runtime directory is read-only"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: raw
              content: |
                File.write("/mise/installs/ruby/3.4.8/test", "x")
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/^/code/main\\.rb:\\d+:.*Read-only file system @ rb_sysopen - /mise/installs/ruby/[\\d.]+/test \\(Errno::EROFS\\)\\n\\tfrom /code/main\\.rb:\\d+:.*\\n$/"
              output: "/^/code/main\\.rb:\\d+:.*Read-only file system @ rb_sysopen - /mise/installs/ruby/[\\d.]+/test \\(Errno::EROFS\\)\\n\\tfrom /code/main\\.rb:\\d+:.*\\n$/"
              exit_code: 1
              status: "OK"
              signal: null
