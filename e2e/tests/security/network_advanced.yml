tests:
  - name: "AF_PACKET raw socket creation is blocked (no CAP_NET_RAW)"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                require 'socket'
                Socket.new(17, 3, 0)
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/sandbox/main.rb:2:in 'Socket#initialize': Operation not permitted - socket(2) (Errno::EPERM)\n\tfrom /sandbox/main.rb:2:in 'IO.new'\n\tfrom /sandbox/main.rb:2:in '<main>'\n"
              output: "/sandbox/main.rb:2:in 'Socket#initialize': Operation not permitted - socket(2) (Errno::EPERM)\n\tfrom /sandbox/main.rb:2:in 'IO.new'\n\tfrom /sandbox/main.rb:2:in '<main>'\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "Unix domain socket to Docker socket path is not reachable"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                require 'socket'
                UNIXSocket.new("/run/docker.sock")
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/sandbox/main.rb:2:in 'UNIXSocket#initialize': No such file or directory - connect(2) for /run/docker.sock (Errno::ENOENT)\n\tfrom /sandbox/main.rb:2:in 'IO.new'\n\tfrom /sandbox/main.rb:2:in '<main>'\n"
              output: "/sandbox/main.rb:2:in 'UNIXSocket#initialize': No such file or directory - connect(2) for /run/docker.sock (Errno::ENOENT)\n\tfrom /sandbox/main.rb:2:in 'IO.new'\n\tfrom /sandbox/main.rb:2:in '<main>'\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "UDP outbound is blocked by network namespace"
    requests:
      - input:
          runtime: node
          files:
            - name: index.js
              type: plain
              content: |
                const dgram = require("dgram");
                const client = dgram.createSocket("udp4");
                client.send("test", 53, "8.8.8.8", (err) => {
                  if (err) {
                    console.error(err.message);
                    process.exit(1);
                  }
                  console.log("sent");
                  client.close();
                });
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "send ENETUNREACH 8.8.8.8:53\n"
              output: "send ENETUNREACH 8.8.8.8:53\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "DNS resolution is blocked by network namespace"
    requests:
      - input:
          runtime: node
          files:
            - name: index.js
              type: plain
              content: |
                const dns = require("dns");
                dns.lookup("example.com", (err) => {
                  if (err) {
                    console.error(err.message);
                    process.exit(1);
                  }
                  console.log("resolved");
                });
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "getaddrinfo EAI_AGAIN example.com\n"
              output: "getaddrinfo EAI_AGAIN example.com\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"
