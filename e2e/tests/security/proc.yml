tests:
  - name: "/proc/sysrq-trigger write is blocked"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                echo b > /proc/sysrq-trigger
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/sandbox/main.sh: line 1: /proc/sysrq-trigger: Read-only file system\n"
              output: "/sandbox/main.sh: line 1: /proc/sysrq-trigger: Read-only file system\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "/proc/self/mem write is blocked"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                echo x > /proc/self/mem
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/sandbox/main.sh: line 1: /proc/self/mem: Read-only file system\n"
              output: "/sandbox/main.sh: line 1: /proc/self/mem: Read-only file system\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "/proc/sys/kernel write is blocked"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                echo 0 > /proc/sys/kernel/randomize_va_space
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/sandbox/main.sh: line 1: /proc/sys/kernel/randomize_va_space: Read-only file system\n"
              output: "/sandbox/main.sh: line 1: /proc/sys/kernel/randomize_va_space: Read-only file system\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "only sandbox PIDs are visible (PID namespace isolation)"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                ls /proc | grep -cE '^[0-9]+$'
        output:
          status: 200
          body:
            run:
              stdout: "/^[1-9]\n$/"
              stderr: ""
              output: "/^[1-9]\n$/"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"
