tests:
  - name: "write core dump pattern to exfiltrate memory"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                echo "|/tmp/exfil %p" > /proc/sys/kernel/core_pattern
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/sandbox/main.sh: line 1: /proc/sys/kernel/core_pattern: Read-only file system\n"
              output: "/sandbox/main.sh: line 1: /proc/sys/kernel/core_pattern: Read-only file system\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "enable core dumps via ulimit"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                ulimit -c unlimited 2>&1
                ulimit -c
        output:
          status: 200
          body:
            run:
              stdout: "/sandbox/main.sh: line 1: ulimit: core file size: cannot modify limit: Operation not permitted\n0\n"
              stderr: ""
              output: "/sandbox/main.sh: line 1: ulimit: core file size: cannot modify limit: Operation not permitted\n0\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

