tests:
  - name: "read /etc/ld.so.cache for library enumeration"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                cat /etc/ld.so.cache
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "cat: /etc/ld.so.cache: No such file or directory\n"
              output: "cat: /etc/ld.so.cache: No such file or directory\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "write to /etc/ld.so.preload for global library injection"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                echo "/sandbox/evil.so" > /etc/ld.so.preload
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/sandbox/main.sh: line 1: /etc/ld.so.preload: Read-only file system\n"
              output: "/sandbox/main.sh: line 1: /etc/ld.so.preload: Read-only file system\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "modify /etc/ld.so.conf for library search path manipulation"
