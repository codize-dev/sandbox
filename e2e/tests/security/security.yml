tests:
  - name: "execution timeout"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            setTimeout(() => {}, 60000);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 137
        status: "TIMEOUT"
        signal: "SIGKILL"

  - name: "timeout with partial output"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            console.log("started");
            setTimeout(() => {}, 60000);
    output:
      status: 200
      run:
        stdout: "started\n"
        stderr: ""
        output: "started\n"
        exit_code: 137
        status: "TIMEOUT"
        signal: "SIGKILL"

  - name: "user exit with signal-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(137);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 137
        status: "OK"
        signal: null

  - name: "user exit with SIGSEGV-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(139);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 139
        status: "OK"
        signal: null

  - name: "user exit with SIGTERM-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(143);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 143
        status: "OK"
        signal: null

  - name: "user exit with SIGINT-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(130);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 130
        status: "OK"
        signal: null

  - name: "path traversal with dotdot-slash"
    input:
      runtime: node
      files:
        - name: "../escape.js"
          content: |
            console.log("escaped");
    output:
      status: 400
      error: 'file name "../escape.js" contains invalid characters'

  - name: "deep path traversal"
    input:
      runtime: node
      files:
        - name: "../../etc/passwd"
          content: |
            console.log("escaped");
    output:
      status: 400
      error: 'file name "../../etc/passwd" contains invalid characters'

  - name: "subdirectory slash rejected"
    input:
      runtime: node
      files:
        - name: "a/b.js"
          content: |
            console.log("escaped");
    output:
      status: 400
      error: 'file name "a/b.js" contains invalid characters'

  - name: "output limit exceeded"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            console.log("AAAAAAAAAA".repeat(10000000))
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: -1
        status: "OUTPUT_LIMIT_EXCEEDED"
        signal: null

  - name: "mlock is blocked"
    input:
      runtime: go
      files:
        - name: main.go
          content: |
            package main

            import (
            	"fmt"
            	"syscall"
            )

            func main() {
            	b := make([]byte, 4096)
            	if err := syscall.Mlock(b); err != nil {
            		fmt.Println("blocked")
            	} else {
            		fmt.Println("allowed")
            	}
            }
    output:
      status: 200
      compile:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 0
        status: "OK"
        signal: null
      run:
        stdout: "blocked\n"
        stderr: ""
        output: "blocked\n"
        exit_code: 0
        status: "OK"
        signal: null

  - name: "real-time scheduling is blocked"
    input:
      runtime: go
      files:
        - name: main.go
          content: |
            package main

            import (
            	"fmt"
            	"syscall"
            	"unsafe"
            )

            func main() {
            	type schedParam struct {
            		priority int32
            	}
            	param := schedParam{priority: 1}
            	_, _, errno := syscall.RawSyscall(
            		syscall.SYS_SCHED_SETSCHEDULER,
            		0, // self
            		1, // SCHED_FIFO
            		uintptr(unsafe.Pointer(&param)),
            	)
            	if errno != 0 {
            		fmt.Println("blocked")
            	} else {
            		fmt.Println("allowed")
            	}
            }
    output:
      status: 200
      compile:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 0
        status: "OK"
        signal: null
      run:
        stdout: "blocked\n"
        stderr: ""
        output: "blocked\n"
        exit_code: 0
        status: "OK"
        signal: null

  - name: "POSIX message queue creation is blocked"
    input:
      runtime: go
      files:
        - name: main.go
          content: |
            package main

            import (
            	"fmt"
            	"syscall"
            	"unsafe"
            )

            func main() {
            	name := []byte("/test\x00")
            	_, _, errno := syscall.Syscall6(
            		syscall.SYS_MQ_OPEN,
            		uintptr(unsafe.Pointer(&name[0])),
            		syscall.O_CREAT|syscall.O_RDWR,
            		0644,
            		0, 0, 0,
            	)
            	if errno != 0 {
            		fmt.Println("blocked")
            	} else {
            		fmt.Println("allowed")
            	}
            }
    output:
      status: 200
      compile:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 0
        status: "OK"
        signal: null
      run:
        stdout: "blocked\n"
        stderr: ""
        output: "blocked\n"
        exit_code: 0
        status: "OK"
        signal: null

  - name: "stack exhaustion is safely handled"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            function f() { f(); }
            try { f(); } catch (e) { console.log("blocked"); }
    output:
      status: 200
      run:
        stdout: "blocked\n"
        stderr: ""
        output: "blocked\n"
        exit_code: 0
        status: "OK"
        signal: null
