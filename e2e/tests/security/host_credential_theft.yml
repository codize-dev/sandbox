  - name: "read GCP default credentials"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                cat /root/.config/gcloud/application_default_credentials.json
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "cat: /root/.config/gcloud/application_default_credentials.json: No such file or directory\n"
              output: "cat: /root/.config/gcloud/application_default_credentials.json: No such file or directory\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "steal TLS private key (node)"
    requests:
      - input:
          runtime: node
          files:
            - name: index.js
              type: plain
              content: |
                const fs = require("fs");
                fs.readFileSync("/etc/ssl/private/server.key");
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/^node:fs:\\d+\\n[\\s\\S]*Error: ENOENT: no such file or directory, open '/etc/ssl/private/server\\.key'[\\s\\S]*Node\\.js v[\\d.]+\\n$/"
              output: "/^node:fs:\\d+\\n[\\s\\S]*Error: ENOENT: no such file or directory, open '/etc/ssl/private/server\\.key'[\\s\\S]*Node\\.js v[\\d.]+\\n$/"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "steal SSH key via Ruby File.read"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                File.read("/root/.ssh/id_rsa")
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/^/sandbox/main\\.rb:\\d+:.*No such file or directory @ rb_sysopen - /root/\\.ssh/id_rsa \\(Errno::ENOENT\\)\\n\\tfrom /sandbox/main\\.rb:\\d+:.*\\n$/"
              output: "/^/sandbox/main\\.rb:\\d+:.*No such file or directory @ rb_sysopen - /root/\\.ssh/id_rsa \\(Errno::ENOENT\\)\\n\\tfrom /sandbox/main\\.rb:\\d+:.*\\n$/"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "read application .env file"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                cat /app/.env
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "cat: /app/.env: No such file or directory\n"
              output: "cat: /app/.env: No such file or directory\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"
