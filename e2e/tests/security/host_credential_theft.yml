              stderr: "cat: /root/.ssh/id_rsa: No such file or directory\n"
              output: "cat: /root/.ssh/id_rsa: No such file or directory\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

