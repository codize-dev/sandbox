tests:
  - name: "read /etc/shadow for password hashes"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                cat /etc/shadow
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "cat: /etc/shadow: No such file or directory\n"
              output: "cat: /etc/shadow: No such file or directory\n"
              exit_code: 1
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "read /etc/passwd for user enumeration"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                cat /etc/passwd
        output:
          status: 200
