tests:
  - name: "sandbox runs as uid=65534 gid=65534"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                echo "uid=$(id -u) gid=$(id -g)"
        output:
          status: 200
          body:
            run:
              stdout: "uid=65534 gid=65534\n"
              stderr: ""
              output: "uid=65534 gid=65534\n"
              exit_code: 0
              status: "OK"
              signal: null

  - name: "setuid(0) is rejected inside the sandbox (node)"
    requests:
      - input:
          runtime: node
          files:
            - name: index.js
              type: plain
              content: |
                try {
                  process.setuid(0);
                  console.log("allowed");
                } catch (e) {
                  console.error(e.message);
                  process.exit(1);
                }
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "EINVAL, Invalid argument\n"
              output: "EINVAL, Invalid argument\n"
              exit_code: 1
              status: "OK"
              signal: null
