tests:
  - name: "personality (ASLR disable) is blocked by seccomp (ruby)"
    arch: [amd64]
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                syscall(135, 0x0040000)
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 159
              status: "SIGNAL"
              signal: "SIGSYS"
              duration_ms: "/^[0-9]+$/"

