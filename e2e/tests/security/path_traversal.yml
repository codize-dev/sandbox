tests:
  - name: "path traversal with dotdot-slash"
    requests:
      - input:
          runtime: node
          files:
            - name: "../escape.js"
              type: raw
              content: |
                console.log("escaped");
        output:
          status: 400
          body:
            error: 'file name "../escape.js" contains invalid characters'

  - name: "deep path traversal"
    requests:
      - input:
          runtime: node
          files:
            - name: "../../etc/passwd"
              type: raw
              content: |
                console.log("escaped");
        output:
          status: 400
          body:
            error: 'file name "../../etc/passwd" contains invalid characters'

  - name: "subdirectory slash rejected"
    requests:
      - input:
          runtime: node
          files:
            - name: "a/b.js"
              type: raw
              content: |
                console.log("escaped");
        output:
          status: 400
          body:
            error: 'file name "a/b.js" contains invalid characters'
