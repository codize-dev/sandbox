tests:
  - name: "path traversal with dotdot-slash"
    requests:
      - input:
          runtime: node
          files:
            - name: "../escape.js"
              type: plain
              content: |
                console.log("escaped");
        output:
          status: 400
          body:
            error:
              code: VALIDATION_ERROR
              message: "request validation failed"
              errors:
                - path: ["files", 0, "name"]
                  message: "contains invalid characters"

  - name: "deep path traversal"
    requests:
      - input:
          runtime: node
          files:
            - name: "../../etc/passwd"
              type: plain
              content: |
                console.log("escaped");
        output:
          status: 400
          body:
            error:
              code: VALIDATION_ERROR
              message: "request validation failed"
              errors:
                - path: ["files", 0, "name"]
                  message: "contains invalid characters"

  - name: "subdirectory slash rejected"
    requests:
      - input:
          runtime: node
          files:
            - name: "a/b.js"
              type: plain
              content: |
                console.log("escaped");
        output:
          status: 400
          body:
            error:
              code: VALIDATION_ERROR
              message: "request validation failed"
              errors:
                - path: ["files", 0, "name"]
                  message: "contains invalid characters"
