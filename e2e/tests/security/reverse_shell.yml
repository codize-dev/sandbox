  - name: "bash reverse shell to IPv6 address is blocked"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                exec 5<>/dev/tcp/::1/4444
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/sandbox/main.sh: connect: Cannot assign requested address\n/sandbox/main.sh: line 1: /dev/tcp/::1/4444: Cannot assign requested address\n"
              output: "/sandbox/main.sh: connect: Cannot assign requested address\n/sandbox/main.sh: line 1: /dev/tcp/::1/4444: Cannot assign requested address\n"
              exit_code: 1
              status: "OK"
              signal: null
