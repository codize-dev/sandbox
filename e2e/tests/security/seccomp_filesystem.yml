tests:
  - name: "open_by_handle_at (Shocker attack) is blocked by seccomp (ruby)"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: raw
              content: |
                nr = RUBY_PLATFORM.include?('aarch64') ? 265 : 304
                syscall(nr, 0, 0, 0)
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 159
              status: "OK"
              signal: "SIGSYS"

