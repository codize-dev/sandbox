tests:
  - name: "bpf is blocked by seccomp (ruby)"
    arch: [amd64]
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: raw
              content: |
                syscall(321, 0, 0, 0)
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 159
              status: "SIGNAL"
              signal: "SIGSYS"

