tests:
  - name: "outbound network access is blocked by network namespace"
    requests:
      - input:
          runtime: node
          files:
            - name: index.js
              type: plain
              content: |
                const net = require("net");
                const socket = new net.Socket();
                socket.connect(80, "8.8.8.8", () => {
                  console.log("connected");
                  socket.destroy();
                });
                socket.on("error", (e) => {
                  console.error(e.message);
                  process.exit(1);
                });
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "connect ENETUNREACH 8.8.8.8:80 - Local (0.0.0.0:0)\n"
              output: "connect ENETUNREACH 8.8.8.8:80 - Local (0.0.0.0:0)\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "outbound HTTP request via fetch is blocked by network namespace"
    requests:
      - input:
          runtime: node
          files:
            - name: index.js
              type: plain
              content: |
                fetch("http://example.com")
                  .then(() => console.log("fetched"))
                  .catch((e) => {
                    console.error(e.cause ? e.cause.message : e.message);
                    process.exit(1);
                  });
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "getaddrinfo EAI_AGAIN example.com\n"
              output: "getaddrinfo EAI_AGAIN example.com\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "loopback interface is disabled inside sandbox"
    requests:
      - input:
          runtime: node
          files:
            - name: index.js
              type: plain
              content: |
                const net = require("net");
                const socket = new net.Socket();
                socket.connect(1234, "127.0.0.1", () => {
                  console.log("connected");
                  socket.destroy();
                });
                socket.on("error", (e) => {
                  console.error(e.message);
                  process.exit(1);
                });
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "connect ENETUNREACH 127.0.0.1:1234 - Local (0.0.0.0:0)\n"
              output: "connect ENETUNREACH 127.0.0.1:1234 - Local (0.0.0.0:0)\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "connecting to loopback server is blocked inside sandbox"
    requests:
      - input:
          runtime: node
          files:
            - name: index.js
              type: plain
              content: |
                const net = require("net");
                const server = net.createServer();
                server.on("error", (e) => {
                  console.error(e.message);
                  process.exit(1);
                });
                server.listen(1234, "127.0.0.1", () => {
                  const client = new net.Socket();
                  client.connect(1234, "127.0.0.1", () => {
                    console.log("connected");
                    client.destroy();
                    server.close();
                  });
                  client.on("error", (e) => {
                    server.close();
                    console.error(e.message);
                    process.exit(1);
                  });
                });
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "connect ENETUNREACH 127.0.0.1:1234 - Local (0.0.0.0:0)\n"
              output: "connect ENETUNREACH 127.0.0.1:1234 - Local (0.0.0.0:0)\n"
              exit_code: 1
              status: "OK"
              signal: null
