tests:
  - name: "reboot is blocked by seccomp (ruby)"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: raw
              content: |
                nr = RUBY_PLATFORM.include?('aarch64') ? 142 : 169
                syscall(nr, 0, 0, 0, 0)
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 159
              status: "OK"
              signal: "SIGSYS"

