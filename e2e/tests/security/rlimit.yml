tests:
  - name: "mlock is blocked"
    requests:
      - input:
          runtime: go
          files:
            - name: main.go
              type: plain
              content: |
                package main

                import (
                	"fmt"
                	"os"
                	"syscall"
                )

                func main() {
                	b := make([]byte, 4096)
                	if err := syscall.Mlock(b); err != nil {
                		fmt.Fprintln(os.Stderr, err)
                		os.Exit(1)
                	}
                	fmt.Println("allowed")
                }
        output:
          status: 200
          body:
            compile:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 0
              status: "OK"
              signal: null
            run:
              stdout: ""
              stderr: "operation not permitted\n"
              output: "operation not permitted\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "real-time scheduling is blocked"
    requests:
      - input:
          runtime: go
          files:
            - name: main.go
              type: plain
              content: |
                package main

                import (
                	"fmt"
                	"os"
                	"syscall"
                	"unsafe"
                )

                func main() {
                	type schedParam struct {
                		priority int32
                	}
                	param := schedParam{priority: 1}
                	_, _, errno := syscall.RawSyscall(
                		syscall.SYS_SCHED_SETSCHEDULER,
                		0, // self
                		1, // SCHED_FIFO
                		uintptr(unsafe.Pointer(&param)),
                	)
                	if errno != 0 {
                		fmt.Fprintln(os.Stderr, errno)
                		os.Exit(1)
                	}
                	fmt.Println("allowed")
                }
        output:
          status: 200
          body:
            compile:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 0
              status: "OK"
              signal: null
            run:
              stdout: ""
              stderr: "operation not permitted\n"
              output: "operation not permitted\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "POSIX message queue creation is blocked"
    requests:
      - input:
          runtime: go
          files:
            - name: main.go
              type: plain
              content: |
                package main

                import (
                	"fmt"
                	"os"
                	"syscall"
                	"unsafe"
                )

                func main() {
                	name := []byte("/test\x00")
                	_, _, errno := syscall.Syscall6(
                		syscall.SYS_MQ_OPEN,
                		uintptr(unsafe.Pointer(&name[0])),
                		syscall.O_CREAT|syscall.O_RDWR,
                		0644,
                		0, 0, 0,
                	)
                	if errno != 0 {
                		fmt.Fprintln(os.Stderr, errno)
                		os.Exit(1)
                	}
                	fmt.Println("allowed")
                }
        output:
          status: 200
          body:
            compile:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 0
              status: "OK"
              signal: null
            run:
              stdout: ""
              stderr: "permission denied\n"
              output: "permission denied\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "stack exhaustion is safely handled"
    requests:
      - input:
          runtime: node
          files:
            - name: index.js
              type: plain
              content: |
                function f() { f(); }
                try { f(); } catch (e) {
                  console.error(e.message);
                  process.exit(1);
                }
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "Maximum call stack size exceeded\n"
              output: "Maximum call stack size exceeded\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "fork bomb is blocked by cgroup pids limit"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                for i in {1..100}; do
                  sleep 1 &
                done
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/^(/code/main\\.sh: fork: retry: Resource temporarily unavailable\n)+$/"
              output: "/^(/code/main\\.sh: fork: retry: Resource temporarily unavailable\n)+$/"
              exit_code: 0
              status: "OK"
              signal: null

  - name: "classic fork bomb is contained by cgroup pids limit"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                :(){ :|:& };: 2>/dev/null
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 0
              status: "OK"
              signal: null
