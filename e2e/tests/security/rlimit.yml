tests:
  - name: "mlock is blocked"
    input:
      runtime: go
      files:
        - name: main.go
          content: |
            package main

            import (
            	"fmt"
            	"syscall"
            )

            func main() {
            	b := make([]byte, 4096)
            	if err := syscall.Mlock(b); err != nil {
            		fmt.Println("blocked")
            	} else {
            		fmt.Println("allowed")
            	}
            }
    output:
      status: 200
      compile:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 0
        status: "OK"
        signal: null
      run:
        stdout: "blocked\n"
        stderr: ""
        output: "blocked\n"
        exit_code: 0
        status: "OK"
        signal: null

  - name: "real-time scheduling is blocked"
    input:
      runtime: go
      files:
        - name: main.go
          content: |
            package main

            import (
            	"fmt"
            	"syscall"
            	"unsafe"
            )

            func main() {
            	type schedParam struct {
            		priority int32
            	}
            	param := schedParam{priority: 1}
            	_, _, errno := syscall.RawSyscall(
            		syscall.SYS_SCHED_SETSCHEDULER,
            		0, // self
            		1, // SCHED_FIFO
            		uintptr(unsafe.Pointer(&param)),
            	)
            	if errno != 0 {
            		fmt.Println("blocked")
            	} else {
            		fmt.Println("allowed")
            	}
            }
    output:
      status: 200
      compile:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 0
        status: "OK"
        signal: null
      run:
        stdout: "blocked\n"
        stderr: ""
        output: "blocked\n"
        exit_code: 0
        status: "OK"
        signal: null

  - name: "POSIX message queue creation is blocked"
    input:
      runtime: go
      files:
        - name: main.go
          content: |
            package main

            import (
            	"fmt"
            	"syscall"
            	"unsafe"
            )

            func main() {
            	name := []byte("/test\x00")
            	_, _, errno := syscall.Syscall6(
            		syscall.SYS_MQ_OPEN,
            		uintptr(unsafe.Pointer(&name[0])),
            		syscall.O_CREAT|syscall.O_RDWR,
            		0644,
            		0, 0, 0,
            	)
            	if errno != 0 {
            		fmt.Println("blocked")
            	} else {
            		fmt.Println("allowed")
            	}
            }
    output:
      status: 200
      compile:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 0
        status: "OK"
        signal: null
      run:
        stdout: "blocked\n"
        stderr: ""
        output: "blocked\n"
        exit_code: 0
        status: "OK"
        signal: null

  - name: "stack exhaustion is safely handled"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            function f() { f(); }
            try { f(); } catch (e) { console.log("blocked"); }
    output:
      status: 200
      run:
        stdout: "blocked\n"
        stderr: ""
        output: "blocked\n"
        exit_code: 0
        status: "OK"
        signal: null

  - name: "fork bomb is blocked by cgroup pids limit"
    input:
      runtime: ruby
      files:
        - name: main.rb
          content: |
            begin
              loop { Process.fork { sleep 10 } }
            rescue Errno::EAGAIN
              puts "blocked"
            end
    output:
      status: 200
      run:
        stdout: "blocked\n"
        stderr: ""
        output: "blocked\n"
        exit_code: 0
        status: "OK"
        signal: null
