tests:
  - name: "user exit with signal-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(137);
    output:
      status: 200
      body:
        run:
          stdout: ""
          stderr: ""
          output: ""
          exit_code: 137
          status: "OK"
          signal: null

  - name: "user exit with SIGSEGV-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(139);
    output:
      status: 200
      body:
        run:
          stdout: ""
          stderr: ""
          output: ""
          exit_code: 139
          status: "OK"
          signal: null

  - name: "user exit with SIGTERM-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(143);
    output:
      status: 200
      body:
        run:
          stdout: ""
          stderr: ""
          output: ""
          exit_code: 143
          status: "OK"
          signal: null

  - name: "user exit with SIGINT-like code"
    input:
      runtime: node
      files:
        - name: index.js
          content: |
            process.exit(130);
    output:
      status: 200
      body:
        run:
          stdout: ""
          stderr: ""
          output: ""
          exit_code: 130
          status: "OK"
          signal: null
