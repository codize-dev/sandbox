tests:
  - name: "user exit with signal-like code"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                exit 137
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 137
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

  - name: "user exit with SIGSEGV-like code"
    requests:
      - input:
          runtime: bash
          files:
