tests:
  - name: "chown to root is blocked (no CAP_CHOWN)"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                touch /tmp/captest && chown 0:0 /tmp/captest
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "chown: changing ownership of '/tmp/captest': Invalid argument\n"
              output: "chown: changing ownership of '/tmp/captest': Invalid argument\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "setting hostname is blocked (no CAP_SYS_ADMIN)"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                hostname attacker
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "hostname: you must be root to change the host name\n"
              output: "hostname: you must be root to change the host name\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "all effective capabilities are zero"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                capeff=$(sed -n 's/^CapEff:[[:space:]]*//p' /proc/self/status)
                if [ "$capeff" = "0000000000000000" ]; then
                  echo "blocked"
                else
                  echo "allowed"
                fi
        output:
          status: 200
          body:
            run:
              stdout: "blocked\n"
              stderr: ""
              output: "blocked\n"
              exit_code: 0
              status: "OK"
              signal: null

  - name: "no_new_privs is set"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                nnp=$(sed -n 's/^NoNewPrivs:[[:space:]]*//p' /proc/self/status)
                if [ "$nnp" = "1" ]; then
                  echo "blocked"
                else
                  echo "allowed"
                fi
        output:
          status: 200
          body:
            run:
              stdout: "blocked\n"
              stderr: ""
              output: "blocked\n"
              exit_code: 0
              status: "OK"
              signal: null
