  - name: "clone3 returns ENOSYS instead of killing process (ruby)"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                begin
                  syscall(435, 0, 0)
                rescue Errno::ENOSYS
                  puts "ENOSYS"
                end
        output:
          status: 200
          body:
            run:
              stdout: "ENOSYS\n"
              stderr: ""
              output: "ENOSYS\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"

