tests:
  - name: "/tmp is mounted with nosuid, nodev, and noexec"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                grep ' /tmp ' /proc/mounts | tr ' ' '\n' | sed -n '4p' | tr ',' '\n' | grep -E '^(nosuid|nodev|noexec)$' | sort
        output:
          status: 200
          body:
            run:
              stdout: "nodev\nnoexec\nnosuid\n"
              stderr: ""
              output: "nodev\nnoexec\nnosuid\n"
              exit_code: 0
              status: "OK"
              signal: null

  - name: "device node creation on /tmp is blocked"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                mknod /tmp/urandom c 1 9
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "mknod: /tmp/urandom: Operation not permitted\n"
              output: "mknod: /tmp/urandom: Operation not permitted\n"
              exit_code: 1
              status: "OK"
              signal: null

  - name: "SUID bit does not grant new privileges"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                cp /usr/bin/id /code/suid-id
                chmod 4755 /code/suid-id
                /code/suid-id
        output:
          status: 200
          body:
            run:
              stdout: "uid=65534 gid=65534 groups=65534\n"
              stderr: ""
              output: "uid=65534 gid=65534 groups=65534\n"
              exit_code: 0
              status: "OK"
              signal: null

  - name: "binary execution from /tmp is blocked by noexec"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                cp /usr/bin/id /tmp/test-exec
                chmod +x /tmp/test-exec
                /tmp/test-exec
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/code/main.sh: line 3: /tmp/test-exec: Permission denied\n"
              output: "/code/main.sh: line 3: /tmp/test-exec: Permission denied\n"
              exit_code: 126
              status: "OK"
              signal: null
