tests:
  - name: "add_key is blocked by seccomp (ruby)"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: raw
              content: |
                nr = RUBY_PLATFORM.include?('aarch64') ? 217 : 248
                syscall(nr, "user", "test", "data", 4, -4)
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 159
              status: "SIGNAL"
              signal: "SIGSYS"

  - name: "keyctl is blocked by seccomp (ruby)"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: raw
              content: |
                nr = RUBY_PLATFORM.include?('aarch64') ? 219 : 250
                syscall(nr, 0, 0, 0, 0, 0)
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 159
              status: "SIGNAL"
              signal: "SIGSYS"

  - name: "request_key is blocked by seccomp (ruby)"
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: raw
              content: |
                nr = RUBY_PLATFORM.include?('aarch64') ? 218 : 249
                syscall(nr, "user", "test", 0, -4)
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 159
              status: "SIGNAL"
              signal: "SIGSYS"
