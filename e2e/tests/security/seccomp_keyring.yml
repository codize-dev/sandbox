tests:
  - name: "add_key is blocked by seccomp (ruby)"
    arch: [amd64]
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                syscall(248, "user", "test", "data", 4, -4)
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 159
              status: "SIGNAL"
              signal: "SIGSYS"

  - name: "add_key is blocked by seccomp (ruby)"
    arch: [arm64]
    requests:
      - input:
          runtime: ruby
          files:
            - name: main.rb
              type: plain
              content: |
                syscall(217, "user", "test", "data", 4, -4)
        output:
