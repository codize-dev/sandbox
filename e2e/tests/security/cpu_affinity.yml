tests:
  - name: "CPU affinity is restricted to 1 core"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                nproc
        output:
          status: 200
          body:
            run:
              stdout: "1\n"
              stderr: ""
              output: "1\n"
              exit_code: 0
              status: "OK"
              signal: null
              duration_ms: "/^[0-9]+$/"
