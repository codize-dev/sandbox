tests:
  - name: "/tmp write is blocked by tmpfs size limit"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: raw
              content: |
                for i in $(seq 0 9); do
                  dd if=/dev/urandom of=/tmp/file$i bs=1M count=10 status=none || exit 1
                done
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: "/^dd: error writing '/tmp/file\\d+': No space left on device\n$/"
              output: "/^dd: error writing '/tmp/file\\d+': No space left on device\n$/"
              exit_code: 1
              status: "OK"
              signal: null
