tests:
  - name: "execution timeout"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                sleep 60
        output:
          status: 200
          body:
            run:
              stdout: ""
              stderr: ""
              output: ""
              exit_code: 137
              status: "TIMEOUT"
              signal: "SIGKILL"
              duration_ms: "/^[0-9]+$/"

  - name: "timeout with partial output"
    requests:
      - input:
          runtime: bash
          files:
            - name: main.sh
              type: plain
              content: |
                echo "started"
                sleep 60
        output:
          status: 200
          body:
            run:
              stdout: "started\n"
              stderr: ""
              output: "started\n"
              exit_code: 137
              status: "TIMEOUT"
              signal: "SIGKILL"
              duration_ms: "/^[0-9]+$/"
