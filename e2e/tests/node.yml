tests:
  - name: "hello world"
    input:
      runtime: node
      code: |
        console.log("Hello, World!");
    output:
      status: 200
      run:
        stdout: "Hello, World!\n"
        stderr: ""
        output: "Hello, World!\n"
        exit_code: 0

  - name: "stderr output"
    input:
      runtime: node
      code: |
        console.error("error message");
    output:
      status: 200
      run:
        stdout: ""
        stderr: "error message\n"
        output: "error message\n"
        exit_code: 0

  - name: "stdout and stderr"
    input:
      runtime: node
      code: |
        console.log("out");
        console.error("err");
    output:
      status: 200
      run:
        stdout: "out\n"
        stderr: "err\n"
        output: "out\nerr\n"
        exit_code: 0

  - name: "non-zero exit code"
    input:
      runtime: node
      code: |
        process.exit(1);
    output:
      status: 200
      run:
        stdout: ""
        stderr: ""
        output: ""
        exit_code: 1

  - name: "stderr with non-zero exit code"
    input:
      runtime: node
      code: |
        console.error("error occurred");
        process.exit(2);
    output:
      status: 200
      run:
        stdout: ""
        stderr: "error occurred\n"
        output: "error occurred\n"
        exit_code: 2
