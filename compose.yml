services:
  sandbox:
    image: sandbox:latest
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    cgroup: host
    command: ["serve", "--run-timeout", "30", "--compile-timeout", "30"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
